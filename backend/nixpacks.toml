[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_mysql",
  "php83Extensions.bcmath",
  "php83Extensions.zip",
  "php83Extensions.mbstring",
  "php83Extensions.pcntl",
  "php83Extensions.tokenizer",
  "php83Extensions.dom",
  "php83Extensions.xml",
  "php83Extensions.ctype",
  "php83Extensions.fileinfo",
  "php83Extensions.openssl",
  "php83Extensions.curl",
  "php83Packages.composer",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.build]
cmds = [
  "npm --prefix frontend ci --prefer-offline",
  "cd frontend && npx vite build --outDir ../backend/public",
  "composer --working-dir=backend install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=ext-oci8",
  "mkdir -p backend/storage/logs backend/storage/framework/cache/data backend/storage/framework/sessions backend/storage/framework/views backend/bootstrap/cache",
  "chmod -R 777 backend/storage backend/bootstrap/cache"
]

[start]
cmd = "cd backend && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force --no-interaction && php artisan serve --host 0.0.0.0 --port ${PORT:-8080}"
