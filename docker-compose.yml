version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    depends_on:
      - php
    networks:
      - stockpilot

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_CONNECTION=oracle
      - DB_HOST=oracle
      - DB_PORT=1521
      - DB_DATABASE=XEPDB1
      - DB_USERNAME=${DB_USERNAME:-stockpilot}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - oracle
      - redis
    networks:
      - stockpilot

  oracle:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    environment:
      - ORACLE_PWD=${ORACLE_PWD:-Oracle123}
      - ORACLE_CHARACTERSET=AL32UTF8
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - stockpilot
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/$$ORACLE_PWD@localhost/XE as sysdba", "<<<", "quit"]
      interval: 30s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - stockpilot

  supervisor:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    command: supervisord -n -c /etc/supervisor/conf.d/supervisord.conf
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - oracle
      - redis
    networks:
      - stockpilot

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    networks:
      - stockpilot

volumes:
  oracle_data:
  redis_data:

networks:
  stockpilot:
    driver: bridge
